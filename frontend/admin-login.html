<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login | PlaySpots</title>

<!-- Google Fonts + Boxicons -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
<link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" />

<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  color: #fff;
  overflow-x: hidden;
  min-height: 100vh;
  position: relative;
}

/* 🔹 Background video */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(55%) contrast(110%);
  transition: filter 0.4s ease-in-out;
}

/* 🔹 Header */
header {
  background: rgba(0, 0, 0, 0.4);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 2px solid rgba(255, 255, 255, 0.1);
}

header h2 {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: 1px;
}

/* � Nav Buttons */
nav {
  display: flex;
  gap: 15px;
}

.nav-btn {
  background: rgba(255, 255, 255, 0.15);
  border: none;
  border-radius: 25px;
  color: #fff;
  font-weight: 600;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
  font-size: 15px;
}

.nav-btn i {
  font-size: 18px;
}

.nav-btn:hover {
  background: #ffeaa7;
  color: #2d3436;
  transform: scale(1.08);
  box-shadow: 0 0 15px rgba(255, 234, 167, 0.5);
}

/* 🔥 Glassmorphism Login Card */
.container {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 15px;
  text-align: center;
  color: #fff;
  width: 320px;
  animation: pop 0.6s ease;
  border: 1px solid rgba(255,255,255,0.3);
  margin: 100px auto;
}

@keyframes pop {
  from { transform: scale(.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  text-align: center;
  outline: none;
  font-size: 15px;
}

button {
  background: #ffeaa7;
  color: #2d3436;
  padding: 10px 25px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: .3s;
  font-weight: bold;
}

button:hover {
  background: #fab1a0;
  transform: scale(1.1);
}

p {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>
  <!-- ✅ Background Video -->
  <video autoplay muted loop id="bgVideo">
    <source src="https://media.istockphoto.com/id/1398679317/video/close-up-fresh-grass-in-well-maintained-large-garden-seen-in-early-summer-in-sunset-showing.mp4?s=mp4-640x640-is&k=20&c=MvSOqqU9TNhKzJeFnHIdJVQHLiMHCVlVU_9jkWVBRF0=" type="video/mp4">
  </video>

  <!-- ✅ Header -->
  <header>
    <h2>PlaySpots</h2>
    <nav>
      <button id="homeBtn" class="nav-btn" onclick="window.location.href='index.html'">
        <i class='bx bx-home'></i> Home
      </button>
      <button id="loginBtn" class="nav-btn" onclick="window.location.href='login.html'">
        <i class='bx bx-log-in'></i>Login
      </button>
      <button id="logoutBtn" class="nav-btn" onclick="logout()">
        <i class='bx bx-log-out'></i> Logout
      </button>
      <button id="adminLoginBtn" class="nav-btn" onclick="window.location.href='admin-login.html'">
        <i class='bx bx-shield-quarter'></i>Admin Login
      </button>
    </nav>
  </header>

  <div class="container">
    <h2>Admin Login</h2>

    <form id="adminLoginForm">
      <input type="email" id="email" placeholder="Email" required /><br />
      <input type="password" id="password" placeholder="Password" required /><br />
      <button type="submit">Login</button>
    </form>

    <p id="msg"></p>
  </div>

<script>
// ✅ Logout Function
function logout() {
  localStorage.removeItem("userToken");
  localStorage.removeItem("adminToken");
  alert("Logged out successfully!");
  window.location.href = "index.html";
}

document.getElementById("adminLoginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  // Get input values
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch("http://localhost:5000/api/admin-auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem("adminToken", data.token);

      // 🔥 DIRECT REDIRECT (NO MESSAGE)
      window.location.href = "admin.html";
      return;
    }

    // ❌ Wrong credentials
    document.getElementById("msg").textContent = "❌ Invalid Credentials!";
  } catch (err) {
    document.getElementById("msg").textContent = "⚠️ Server Error!";
  }
});
</script>


</body>
</html>
