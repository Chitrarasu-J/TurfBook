<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlaySpots | Book Turf</title>

  <!-- Google Fonts + Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" />

  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      color: #fff;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* 🔹 Background video */
    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: -1;
      filter: brightness(55%) contrast(110%);
      transition: filter 0.4s ease-in-out;
    }

    body:hover #bgVideo {
      filter: brightness(65%) contrast(115%);
    }

    /* 🔹 Header */
    header {
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    }

    header h2 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* 🔹 Nav Buttons */
    nav {
      display: flex;
      gap: 15px;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 25px;
      color: #fff;
      font-weight: 600;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      font-size: 15px;
    }

    .nav-btn i {
      font-size: 18px;
    }

    .nav-btn:hover {
      background: #ffeaa7;
      color: #2d3436;
      transform: scale(1.08);
      box-shadow: 0 0 15px rgba(255, 234, 167, 0.5);
    }

    /* 🔹 Search bar */
    .search-container {
      text-align: center;
      margin: 40px auto 20px;
      z-index: 2;
      position: relative;
    }

    .search-input {
      width: 60%;
      max-width: 500px;
      padding: 15px 20px 15px 50px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      outline: none;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .search-input:focus {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 234, 167, 0.5);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), 0 0 0 3px rgba(255, 234, 167, 0.1);
      transform: translateY(-2px);
    }

    /* .search-container::before {
      content: "";
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: rgba(255, 255, 255, 0.7);
      z-index: 3;
      pointer-events: none;
    } */

    /* 🔹 Turf Grid */
    .turf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
      padding: 40px;
      animation: fadeIn 1.2s ease-in-out;
      position: relative;
      z-index: 2;
    }

    /* 🔹 Enhanced Square Turf Cards */
    .turf-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      border-radius: 15px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      width: 280px;
      height: auto;
      min-height: 320px;
      display: flex;
      flex-direction: column;
    }

    .turf-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .turf-image-container {
      width: 100%;
      height: 200px;
      overflow: hidden;
    }

    .turf-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .turf-card:hover .turf-image {
      transform: scale(1.05);
    }

    .turf-info {
      padding: 15px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .turf-info h3 {
      color: #ffeaa7;
      font-size: 1.3rem;
      margin-bottom: 10px;
    }

    .location {
      color: #ecf0f1;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .price {
      color: #ffeaa7;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .turf-details {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .rating {
      background: rgba(255, 234, 167, 0.2);
      color: #ffeaa7;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .price {
      color: #ffeaa7;
      font-weight: bold;
      font-size: 1rem;
    }

    .sports-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .sport-tag {
      background: rgba(255, 255, 255, 0.1);
      color: #ecf0f1;
      padding: 4px 10px;
      border-radius: 15px;
      font-size: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .book-btn {
      background: #ffeaa7;
      color: #2d3436;
      border: none;
      padding: 12px 24px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      width: 100%;
      font-size: 0.95rem;
    }

    .book-btn:hover {
      background: #fab1a0;
      transform: scale(1.05);
    }

    /* 🔹 No Results State */
    .no-results {
      text-align: center;
      padding: 80px 20px;
      grid-column: 1 / -1;
    }

    .no-results i {
      font-size: 4rem;
      color: #ffeaa7;
      margin-bottom: 20px;
      display: block;
    }

    .no-results h3 {
      color: #ffeaa7;
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .no-results p {
      color: #ecf0f1;
      font-size: 1rem;
      opacity: 0.8;
    }

    /* 🔹 Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      position: relative;
      z-index: 2;
    }

    .empty-state i {
      font-size: 5rem;
      color: #ffeaa7;
      margin-bottom: 20px;
      display: block;
    }

    .empty-state h2 {
      color: #ffeaa7;
      font-size: 2rem;
      margin-bottom: 15px;
    }

    .empty-state p {
      color: #ecf0f1;
      font-size: 1.1rem;
      opacity: 0.8;
    }

    /* 🔹 Loader */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #00b894, #0984e3);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 24px;
      font-weight: bold;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }
    .turf-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}

.turf-card {
  width: 280px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 15px;
  text-align: center;
  color: white;
}
.turf-card img {
  width: 100%;
  height: 160px;
  border-radius: 10px;
}

  </style>

  <script>
    window.addEventListener("load", () => {
      const loader = document.getElementById("loader");
      loader.style.opacity = "0";
      setTimeout(() => loader.style.display = "none", 800);
    });

    function logout() {
      localStorage.removeItem("userToken");
      alert("Logged out successfully!");
      window.location.href = "login.html";
    }
  </script>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body>
  <!-- ✅ Background Video -->
  <video autoplay muted loop id="bgVideo">
    <source src="https://v.ftcdn.net/15/54/64/81/700_F_1554648111_UYkVgH9kET1hZScBtzVYYkWes21xHUU4_ST.mp4"
      type="video/mp4">
  </video>


  <!-- ✅ Loader -->



  <!-- ✅ Header -->
  <header>
    <h2>PlaySpots</h2>
    <nav>
      <button class="nav-btn" onclick="window.location.href='index.html'">
        <i class='bx bx-home'></i> Home
      </button>
    </nav>
  </header>
  <!-- ✅ Search Bar -->
  <div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="Search turfs by name or location..." onkeyup="searchTurfs()" />
  </div>
  
  <div id="turfContainer" class="turf-grid"></div>
  
  <script>
    // Load turfs from backend
    let allTurfs = [];

    async function loadTurfsFromBackend() {
      try {
        const res = await fetch("http://localhost:5000/api/turf");
        const turfs = await res.json();
        
        allTurfs = turfs;
        displayTurfs(allTurfs);
      } catch (err) {
        console.error("Error loading turfs:", err);
        const container = document.getElementById("turfContainer");
        container.innerHTML = `
          <div class="no-results">
            <i class='bx bx-error'></i>
            <h3>Error Loading Turfs</h3>
            <p>Unable to load turfs. Please try again later.</p>
          </div>
        `;
      }
    }

    // Function to display turfs in square cards
    function displayTurfs(turfs) {
      const container = document.getElementById("turfContainer");
      
      if (turfs.length === 0) {
        container.innerHTML = `
          <div class="no-results">
            <i class='bx bx-search'></i>
            <h3>No turfs found</h3>
            <p>No turfs have been added yet. Please check back later!</p>
          </div>
        `;
        return;
      }

      container.innerHTML = turfs.map(turf => `
        <div class="turf-card">
          <div class="turf-image-container">
            <img src="${turf.image}" alt="${turf.name}" class="turf-image">
          </div>
          <div class="turf-info">
            <h3>${turf.name}</h3>
            <p class="location"><i class='bx bx-map'></i> ${turf.location}</p>
            <p class="price">${turf.price || 'N/A'}</p>
            <button class="book-btn" onclick="bookTurf('${turf._id}')">Book Now</button>
          </div>
        </div>
      `).join('');
    }

    // Search function
    function searchTurfs() {
      const searchTerm = document.getElementById("searchInput").value.toLowerCase().trim();
      
      if (searchTerm === "") {
        displayTurfs(allTurfs);
        return;
      }

      const filteredTurfs = allTurfs.filter(turf => 
        turf.name.toLowerCase().includes(searchTerm) ||
        turf.location.toLowerCase().includes(searchTerm)
      );

      displayTurfs(filteredTurfs);
    }

    // Book turf function
    function bookTurf(turfId) {
      const turf = allTurfs.find(t => t._id === turfId);
      if (!turf) return;

      const date = prompt(`Enter booking date for ${turf.name} (YYYY-MM-DD):`);
      const time = prompt(`Enter booking time (HH:MM):`);

      if (!date || !time) {
        alert("⚠️ Please enter both date and time");
        return;
      }

      // Send booking to backend
      sendBookingToBackend(turfId, date, time);
    }

    // Function to send booking to backend
    async function sendBookingToBackend(turfId, date, time) {
      try {
        const response = await fetch('http://localhost:5000/api/bookings/create', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            turfId,
            date,
            time
          })
        });

        const data = await response.json();
        if (response.ok) {
          alert(`✅ Booking confirmed for ${turfId} on ${date} at ${time}!`);
          
          // Emit Socket.io event for real-time admin update
          if (window.socket) {
            window.socket.emit('newBooking', {
              turfId,
              date,
              time,
              userEmail: 'user@example.com'
            });
          }
        } else {
          alert(`❌ Booking failed: ${data.message || 'Unknown error'}`);
        }
      } catch (error) {
        console.error('Booking error:', error);
        alert('❌ Error connecting to server for booking');
      }
    }

    // Initialize Socket.io connection
    document.addEventListener('DOMContentLoaded', function() {
      // Connect to Socket.io
      window.socket = io('http://localhost:5000');
      
      window.socket.on('connect', function() {
        console.log('Connected to Socket.io server');
      });
    });

    // Load turfs when page loads
    window.addEventListener("DOMContentLoaded", loadTurfsFromBackend);
  </script>
</body>
</html>
